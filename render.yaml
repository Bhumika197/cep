services:
  # Backend Service
  - type: web
    name: smart-gaushala-backend
    env: node
    repo: https://github.com/Bhumika197/cep.git
    rootDir: server
    buildCommand: npm install
    startCommand: node simple-server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5002
    healthCheckPath: /api/health
    
  # Frontend Service
  - type: web
    name: smart-gaushala-frontend
    env: static
    repo: https://github.com/Bhumika197/cep.git
    rootDir: client
    buildCommand: npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://smart-gaushala-backend.onrender.com
    routes:
      - type: rewrite
        source: /api/*
        destination: https://smart-gaushala-backend.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
